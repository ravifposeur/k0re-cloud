openapi: 3.0.3
info:
  title: k0re Daemon API
  description: REST API for the k0red game server provisioning daemon
  version: 1.0.0

servers:
  - url: http://127.0.0.1:3000
    description: Local daemon

paths:
  /v1/provision:
    post:
      summary: Provision a new game server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, game, flavor, ram]
              properties:
                name:
                  type: string
                  example: arena-ugm-01
                game:
                  type: string
                  example: minecraft
                flavor:
                  type: string
                  example: pvp-competitive
                ram:
                  type: string
                  example: "2G"
      responses:
        "200":
          description: Provisioning successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request (missing or invalid fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/status/{name}:
    get:
      summary: Get the status of a provisioned game server
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: arena-ugm-01
      responses:
        "200":
          description: Server status retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Server provisioned
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Deskripsi error
    StatusResponse:
      type: object
      properties:
        name:
          type: string
          example: arena-ugm-01
        status:
          type: string
          example: running
        cpu_usage:
          type: string
          example: "12%"
        mem_usage:
          type: string
          example: 512MB/2GB
