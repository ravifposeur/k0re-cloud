openapi: 3.0.0
info:
  title: K0re Cloud API
  description: API Orchestrator untuk manajemen siklus hidup server game berbasis container (K0re Cloud).
  version: 1.0.0

servers:
  - url: http://127.0.0.1:3000
    description: Daemon Lokal

paths:
  /v1/provision:
    post:
      summary: Membuat/Provision server baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionRequest'
      responses:
        '200':
          description: Server berhasil di-provision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
        '400':
          description: Request tidak valid atau parameter kurang

  /v1/status/{name}:
    get:
      summary: Mendapatkan metrik live dan status server
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Nama unik server
      responses:
        '200':
          description: Data status berhasil diambil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '404':
          description: Server tidak ditemukan

  /v1/control/{name}/start:
    post:
      summary: Menyalakan kembali server yang sedang berhenti (exited)
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server berhasil dinyalakan
        '500':
          description: Gagal mengeksekusi kernel lifecycle (bash error)

  /v1/control/{name}/stop:
    post:
      summary: Menghentikan server secara aman (stop container)
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server berhasil dihentikan

  /v1/control/{name}:
    delete:
      summary: Menghancurkan server secara permanen (destroy)
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server dan resource terkait telah dihapus

components:
  schemas:
    ProvisionRequest:
      type: object
      required:
        - name
        - game
        - flavor
        - ram
      properties:
        name:
          type: string
          example: "arena-ugm-01"
        game:
          type: string
          enum: [minecraft]
          example: "minecraft"
        flavor:
          type: string
          example: "pvp-competitive"
        ram:
          type: string
          example: "2G"

    APIResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Server provisioned"

    StatusResponse:
      type: object
      properties:
        name:
          type: string
          example: "arena-ugm-01"
        status:
          type: string
          example: "running"
        cpu_usage:
          type: string
          example: "1.86%"
        mem_usage:
          type: string
          example: "2.41GiB"
        last_updated:
          type: string
          format: date-time
          example: "2026-04-24T20:15:24+07:00"